<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Albums</h1>
        <nav class="tabs" aria-label="Playlist view tabs">
            <button type="button" class="tab-button" data-view="featured">Featured</button>
            <button type="button" class="tab-button active" data-view="all">All</button>
        </nav>
    </header>

    <main class="app-content">
        <!-- Content will be dynamically populated from data.json via script.js -->
    </main>

    <div id="playlistModal" class="modal modal-overlay" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-label="Playlist details">
            <span class="close" aria-label="Close modal">&times;</span>
            <div class="modal-header">
                <img id="playlistImage" src="" alt="Playlist cover image">
                <div class="modal-header-text">
                    <h1 id="playlistName"></h1>
                    <p id="playlistCreator"></p>
                    <button type="button" id="shuffleButton" class="shuffle-button" aria-label="Shuffle playlist">
                        Shuffle
                    </button>
                </div>
            </div>
            <div id="songList"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Salesforce FTL. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

    <script src="script.js"></script>
</body>
</html>
