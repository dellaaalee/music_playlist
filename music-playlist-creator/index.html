<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Albums</h1>
        <div class="header-controls">
            <button type="button" id="addButton" class="add-button" aria-label="Add playlist">
                <svg class="add-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button type="button" id="searchToggle" class="search-toggle-button" aria-label="Toggle search">
                <img src="assets/img/search_icon.png" alt="Search" class="search-icon">
            </button>
            <nav class="tabs" aria-label="Playlist view tabs">
                <button type="button" class="tab-button" data-view="featured">Featured</button>
                <button type="button" class="tab-button active" data-view="all">All</button>
            </nav>
        </div>
    </header>

    <div id="searchBar" class="search-bar hidden">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search playlists..." aria-label="Search playlists">
            <button type="button" id="searchButton" class="search-button">Search</button>
            <button type="button" id="clearButton" class="clear-button">Clear</button>
        </div>
    </div>

    <div class="sort-bar">
        <div class="sort-container">
            <label for="sortSelect" class="sort-label">Sort by:</label>
            <select id="sortSelect" class="sort-select" aria-label="Sort playlists">
                <option value="default">Default</option>
                <option value="likes">Like Count</option>
                <option value="az">A-Z</option>
            </select>
        </div>
    </div>

    <main class="app-content">
        <!-- Content will be dynamically populated from data.json via script.js -->
    </main>

    <div id="playlistModal" class="modal modal-overlay" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-label="Playlist details">
            <button type="button" id="menuButton" class="menu-button" aria-label="Menu options">
                <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="5" r="2" fill="currentColor"/>
                    <circle cx="12" cy="12" r="2" fill="currentColor"/>
                    <circle cx="12" cy="19" r="2" fill="currentColor"/>
                </svg>
            </button>
            <div id="dropdownMenu" class="dropdown-menu hidden">
                <button type="button" id="editPlaylistButton" class="dropdown-item">
                    Edit Playlist
                </button>
                <button type="button" id="deletePlaylistButton" class="dropdown-item dropdown-item-danger" onclick="console.log('Inline click works!')">
                    Delete Playlist
                </button>
            </div>
            <div class="modal-header">
                <img id="playlistImage" src="" alt="Playlist cover image">
                <div class="modal-header-text">
                    <h1 id="playlistName"></h1>
                    <p id="playlistCreator"></p>
                    <p id="aiSummaryText" class="ai-summary-text hidden"></p>
                    <div class="modal-buttons">
                        <button type="button" id="shuffleButton" class="shuffle-button" aria-label="Shuffle playlist">
                            Shuffle
                        </button>
                        <button type="button" id="aiSummaryButton" class="ai-summary-button" aria-label="Get Description">
                            <img src="assets/img/ai_icon.png" alt="AI" class="ai-icon">
                            Get Description
                        </button>
                    </div>
                </div>
            </div>
            <div id="songList"></div>
        </div>
    </div>

    <div id="addSongModal" class="modal modal-overlay" aria-hidden="true">
        <div class="add-song-modal-content" role="dialog" aria-modal="true" aria-label="Add songs to playlist">
            <div class="add-song-header">
                <h2>Add Songs</h2>
                <button type="button" id="closeAddSongModal" class="close-modal-button" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div id="addSongList" class="add-song-list"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Salesforce FTL. All rights reserved.</p>
    </footer>

    <script src="secrets.js"></script>
    <script src="script.js"></script>
</body>
</html>
